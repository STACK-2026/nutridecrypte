name: rebuild-guard

on:
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  touch:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push marker
        run: |
          git config user.name "rebuild-guard[bot]"
          git config user.email "rebuild-guard@users.noreply.github.com"
          # Reset-then-recreate pattern: never conflict on concurrent timestamp writes.
          # Always re-anchors to origin/main on a real branch so push from detached HEAD impossible.
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            git fetch origin
            git checkout -B main origin/main
            mkdir -p site/public
            date -u +"%Y-%m-%dT%H:%M:%SZ" > site/public/.rebuild-marker
            echo "rebuild-guard $(date -u +%F)" >> site/public/.rebuild-marker
            git add site/public/.rebuild-marker
            if git diff --cached --quiet; then echo "no changes" && exit 0; fi
            git commit -m "chore(rebuild-guard): daily marker $(date -u +%F)"
            if git push origin main; then exit 0; fi
            echo "push attempt $i failed, retrying..."
            sleep $((2 + RANDOM % 6))
          done
          echo "push failed after 5 attempts" >&2
          exit 1
