name: Deploy site to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-site.yml'
  workflow_run:
    workflows: ["blog-auto", "rebuild-guard"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-site-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: self-hosted
    timeout-minutes: 20
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install deps
        run: npm ci || npm install
      - name: Sanitize content frontmatter (clamp description to 160 chars)
        # Routine claude.ai occasionally publishes articles with description > 160 chars,
        # which Astro content schema rejects. Clamp at build time to keep prod unblocked.
        working-directory: site
        run: |
          python3 - <<'PY'
          import re, pathlib
          CAP = 160
          changed = []
          for md in pathlib.Path("src/content/blog").rglob("*.md"):
              text = md.read_text(encoding="utf-8")
              m = re.search(r'^description:\s*"(.+?)"\s*$', text, re.M)
              if not m: continue
              desc = m.group(1)
              if len(desc) <= CAP: continue
              trimmed = desc[:CAP-1].rsplit(" ", 1)[0].rstrip(",;:.- ") + "…"
              text2 = text.replace(m.group(0), f'description: "{trimmed}"', 1)
              md.write_text(text2, encoding="utf-8")
              changed.append((md.name, len(desc), len(trimmed)))
          for name, before, after in changed:
              print(f"  CLAMP {name}: {before} -> {after}")
          print(f"sanitize: {len(changed)} clamped")
          PY


      - name: Install cloudflared (if missing)
        run: |
          if command -v cloudflared >/dev/null 2>&1; then echo "cloudflared: $(command -v cloudflared)"; exit 0; fi
          OS=$(uname -s | tr '[:upper:]' '[:lower:]'); ARCH=$(uname -m)
          case "$ARCH" in x86_64) A=amd64;; arm64|aarch64) A=arm64;; *) A=amd64;; esac
          mkdir -p "$RUNNER_TEMP/bin"
          if [ "$OS" = "darwin" ]; then
            curl -fsSL -o "$RUNNER_TEMP/cf.tgz" "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-darwin-$A.tgz"
            tar xzf "$RUNNER_TEMP/cf.tgz" -C "$RUNNER_TEMP/bin"
          else
            curl -fsSL -o "$RUNNER_TEMP/bin/cloudflared" "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-$A"
          fi
          chmod +x "$RUNNER_TEMP/bin/cloudflared"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Open DB tunnel (VPS Postgres via Cloudflare Access)
        env:
          CF_ID: ${{ secrets.VPS_PG_CF_ACCESS_CLIENT_ID }}
          CF_SECRET: ${{ secrets.VPS_PG_CF_ACCESS_CLIENT_SECRET }}
          PG_PORT: '5432'
        run: |
          if [ -z "$CF_ID" ] || [ -z "$CF_SECRET" ]; then echo "::error::VPS CF Access service token secrets missing"; exit 1; fi
          nohup cloudflared access tcp --hostname pg.augustinfoucheres.com --url 127.0.0.1:$PG_PORT \
            --service-token-id "$CF_ID" --service-token-secret "$CF_SECRET" > "$RUNNER_TEMP/cfd.log" 2>&1 &
          echo "tunnel pid $!"
          ok=0
          for i in $(seq 1 30); do (exec 3<>/dev/tcp/127.0.0.1/$PG_PORT) 2>/dev/null && { ok=1; exec 3>&- 3<&-; break; }; sleep 1; done
          if [ "$ok" != 1 ]; then echo "::error::DB tunnel port $PG_PORT never opened"; tail -20 "$RUNNER_TEMP/cfd.log" || true; exit 1; fi
          echo "tunnel up on 127.0.0.1:$PG_PORT"

      - name: Build (with VPS DATABASE_URL)
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
          PUBLIC_AMAZON_TAG: ${{ secrets.PUBLIC_AMAZON_TAG }}
          DB_URL_SECRET: ${{ secrets.VPS_PG_NUTRIDECRYPTE_URL }}
          PG_PORT: '5432'
        run: |
          if [ -z "$DB_URL_SECRET" ]; then echo "::error::VPS_PG_NUTRIDECRYPTE_URL missing -- refusing degraded build"; exit 1; fi
          export DATABASE_URL=$(printf '%s' "$DB_URL_SECRET" | sed "s#:5432/#:${PG_PORT}/#")
          npm run build

      - name: Guard - refuse degraded build
        run: |
          N=$(find dist -name '*.html' | wc -l | tr -d ' ')
          echo "dist html pages: $N"
          if [ "$N" -lt 2000 ]; then echo "::error::Degraded build ($N html < 2000) -- VPS read failed, NOT deploying"; exit 1; fi
          echo "build healthy ($N pages)"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: site
          command: pages deploy dist --project-name=nutridecrypte --branch=main

      - name: Purge CF cache for SEO-critical files
        # Activates once CF_PURGE_TOKEN secret is set (Phase 3 of deploy hardening).
        # Until then this step gracefully no-ops -- safe to merge.
        if: success()
        env:
          CF_PURGE_TOKEN: ${{ secrets.CF_PURGE_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          SITE_URL: https://nutridecrypte.com
        run: |
          if [ -z "$CF_PURGE_TOKEN" ] || [ -z "$CF_ZONE_ID" ]; then
            echo "CF_PURGE_TOKEN or CF_ZONE_ID missing, skip (Phase 3 not yet wired)"; exit 0;
          fi
          curl -fsS -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_PURGE_TOKEN" \
            -H "Content-Type: application/json" \
            --data "{\"files\":[\"$SITE_URL/robots.txt\",\"$SITE_URL/sitemap.xml\",\"$SITE_URL/sitemap-index.xml\",\"$SITE_URL/llms.txt\",\"$SITE_URL/llms-full.txt\",\"$SITE_URL/ai-sitemap.xml\"]}" || true

      - name: Ping IndexNow
        if: success()
        env:
          SITE_URL: https://nutridecrypte.com
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: python3 scripts/indexnow_ping.py || true
